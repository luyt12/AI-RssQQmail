name: RSS Mailer

on:
  schedule:
    - cron: "0 10 * * *"  # UTC 10:00 = Beijing 18:00
  workflow_dispatch:

jobs:
  send-rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Argos Translate models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/argos-translate
          key: argos-translate-en-zh-v1

      - name: Install dependencies
        run: pip install -r requirements.txt 2>&1

      - name: Run
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SUBJECT: "Daily RSS Digest"
        run: |
          python -c "import sys; print('Python:', sys.version); import argostranslate; print('Argos OK')" 2>&1 || echo "IMPORT_FAILED"
          python rss_mailer.py 2>&1
